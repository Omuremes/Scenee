<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&amp;family=Be+Vietnam+Pro:wght@300;400&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-container": "#0072d7",
                      "surface-container-high": "#e7e8e9",
                      "surface-container": "#edeeef",
                      "background": "#ffffff",
                      "error-container": "#ffdad6",
                      "surface-variant": "#e1e3e4",
                      "secondary": "#525f71",
                      "on-primary-fixed-variant": "#930007",
                      "primary-container": "#e50914",
                      "on-tertiary-fixed": "#001b3c",
                      "on-secondary-fixed": "#0f1c2c",
                      "on-secondary": "#ffffff",
                      "on-primary-container": "#ffffff",
                      "secondary-container": "#d3e1f6",
                      "inverse-primary": "#ffb4aa",
                      "secondary-fixed": "#d6e4f9",
                      "error": "#ba1a1a",
                      "on-tertiary-container": "#f8f9ff",
                      "on-error-container": "#93000a",
                      "inverse-on-surface": "#f0f1f2",
                      "primary": "#E50914",
                      "on-surface": "#191c1d",
                      "on-tertiary": "#ffffff",
                      "on-primary-fixed": "#410001",
                      "on-secondary-container": "#566475",
                      "surface-container-low": "#f3f4f5",
                      "on-primary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "surface": "#ffffff",
                      "tertiary-fixed": "#d5e3ff",
                      "outline-variant": "#e9bcb6",
                      "on-tertiary-fixed-variant": "#004689",
                      "tertiary": "#005aab",
                      "surface-bright": "#ffffff",
                      "surface-tint": "#e50914",
                      "on-error": "#ffffff",
                      "outline": "#936e69",
                      "on-background": "#191c1d",
                      "on-secondary-fixed-variant": "#3a4859",
                      "primary-fixed": "#ffdad5",
                      "surface-container-highest": "#e1e3e4",
                      "inverse-surface": "#2e3132",
                      "surface-dim": "#d9dadb",
                      "tertiary-fixed-dim": "#a7c8ff",
                      "secondary-fixed-dim": "#bac8dc",
                      "primary-fixed-dim": "#ffb4aa"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Plus Jakarta Sans"],
                      "display": ["Plus Jakarta Sans"],
                      "body": ["Plus Jakarta Sans"],
                      "label": ["Plus Jakarta Sans"]
              }
            },
          },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-center">
<main class="w-full max-w-md px-6 py-12 flex flex-col items-center justify-center">
    <div class="w-full space-y-10">
        <!-- Brand Identity -->
        <div class="flex flex-col items-center space-y-2"><div class="mb-4 text-primary">
            <span class="material-symbols-outlined !text-6xl" style="font-variation-settings: 'FILL' 1, 'wght' 700;">movie</span>
        </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-on-surface text-center">Welcome to CinePass</h1>
            <p class="text-secondary font-light text-lg">Create account</p>
        </div>
        <!-- Signup Form -->
        <form class="space-y-6">
            <div class="space-y-4">
                <!-- Username -->
                <div class="relative">
                    <input class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 px-6 py-4 rounded-full transition-all placeholder:text-slate-400 font-body text-sm" placeholder="Username" type="text"/>
                </div>
                <!-- Email Address -->
                <div class="relative">
                    <input class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 px-6 py-4 rounded-full transition-all placeholder:text-slate-400 font-body text-sm" placeholder="Email Address" type="email"/>
                </div>
                <!-- Password -->
                <div class="relative">
                    <input class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 px-6 py-4 rounded-full transition-all placeholder:text-slate-400 font-body text-sm" placeholder="Password" type="password"/>
                </div>
                <!-- Confirm Password -->
                <div class="relative">
                    <input class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 px-6 py-4 rounded-full transition-all placeholder:text-slate-400 font-body text-sm" placeholder="Confirm Password" type="password"/>
                </div>
            </div>
            <!-- Terms -->
            <div class="flex items-center space-x-3 px-2">
                <input class="w-5 h-5 rounded-full border-surface-container-high text-primary focus:ring-primary" id="terms" type="checkbox"/>
                <label class="text-sm font-body text-secondary" for="terms">
                    I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms &amp; Conditions</a>
                </label>
            </div>
            <!-- Primary Action -->
            <button class="w-full bg-primary text-on-primary font-display font-bold py-5 rounded-full shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform text-lg" type="submit">
                Sign Up
            </button>
        </form>
        <!-- Divider -->
        <div class="relative flex items-center py-2">
            <div class="flex-grow border-t border-surface-container-high"></div>
            <span class="flex-shrink mx-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Or continue with</span>
            <div class="flex-grow border-t border-surface-container-high"></div>
        </div>
        <!-- Social Logins -->
        <div class="grid gap-4 grid-cols-1">
            <button class="flex items-center justify-center space-x-2 py-4 px-6 border border-surface-container-high rounded-full hover:bg-surface-container-low transition-colors active:scale-95">
                <img alt="" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmk3-JcMFyY3Y_3QL5vHLHVOY-S15qTQcc7cKk_h_52FCSffbDIvBh1zhh6QbFzgJDhqc-hBC83UohaRskurDMWXrXpT3vvOo90dawoZqb5NtiPKi77g9J9DG34qH4uLsigp8MSMN-6j_8ivhQ9wv6i0F2dq_9XFr7rKbIxZzwSgVHsLiVvM1SkMkYh2h7S-gLHbZb-k1r-7w93EQ4LjDEooMmetfULYX7aZT6_XgG2x5kt7ApkrrBNpb_WeY1FIOMuUUl7ExMCQ"/>
                <span class="font-display font-bold text-on-surface text-sm">Google</span>
            </button>
        </div>
        <!-- Footer Link -->
        <div class="text-center pt-4">
            <p class="text-secondary font-body">
                Already have an account?
                <a class="text-primary font-bold hover:underline ml-1" href="#">Login</a>
            </p>
        </div>
    </div>
</main>
</body></html>

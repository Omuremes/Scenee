<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CinePass - All Movies</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#E50914",
                        background: "#ffffff",
                        surface: "#ffffff",
                        "on-surface": "#1A1C1E",
                        "on-surface-variant": "#44474E",
                        outline: "#74777F",
                        "surface-container-low": "#F7F9FF",
                        "surface-container-high": "#EFF1F8",
                    },
                    borderRadius: {
                        DEFAULT: "1.25rem",
                        lg: "2rem",
                        xl: "2.5rem",
                        full: "9999px"
                    },
                    fontFamily: {
                        sans: ["Plus Jakarta Sans", "sans-serif"],
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                        body: ["Plus Jakarta Sans", "sans-serif"],
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #1A1C1E;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .active-nav-indicator {
            position: relative;
        }
        .active-nav-indicator::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: #E50914;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen pb-32">
<!-- Header: Matches SCREEN_31 style -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl px-6 py-4 flex items-center">
<div class="flex items-center w-full relative h-10">
<button class="absolute left-0 text-on-surface p-1 hover:bg-zinc-100 rounded-full transition-colors">
<span class="material-symbols-outlined text-[28px]">chevron_left</span>
</button>
<h1 class="w-full text-center text-lg font-bold text-on-surface">All Movies</h1>
</div>
</header>
<main class="pt-24 px-6">

<div class="relative flex-1">

<input class="w-full bg-zinc-100 border-none rounded-2xl py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-zinc-400 font-medium text-sm" placeholder="Search movies or cinemas" type="text"/>
</div>
<button class="bg-zinc-100 aspect-square w-12 rounded-2xl flex items-center justify-center active:scale-95 transition-transform text-primary">
<span class="material-symbols-outlined">tune</span>
</button>
</div>
</div>
<!-- Categories / Chips -->
<div class="flex gap-2.5 overflow-x-auto no-scrollbar mb-8">
<button class="bg-primary text-white px-6 py-2 rounded-full font-semibold text-sm whitespace-nowrap shadow-lg shadow-primary/20">Now Showing</button>
<button class="bg-zinc-100 text-zinc-500 px-6 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-zinc-200 transition-colors">Coming Soon</button>
<button class="bg-zinc-100 text-zinc-500 px-6 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-zinc-200 transition-colors">IMAX</button>
<button class="bg-zinc-100 text-zinc-500 px-6 py-2 rounded-full font-semibold text-sm whitespace-nowrap hover:bg-zinc-200 transition-colors">Premiere</button>
</div>

<span class="text-[11px] font-bold text-on-surface">8.4</span>
</div>

<span class="material-symbols-outlined text-amber-500 text-xs" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-[11px] font-bold text-on-surface">7.9</span>
</div>
</div>
<h3 class="font-bold text-base leading-tight mb-1 text-on-surface group-hover:text-primary transition-colors px-1">Neon Echoes</h3>
<p class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold px-1">THRILLER • 1H 52M</p>
</div>
<!-- Movie Item 3 -->
<div class="flex flex-col group">

<div class="absolute top-4 left-4 bg-white/95 backdrop-blur-md px-2.5 py-1 rounded-full flex items-center gap-1 shadow-sm">

<span class="text-[11px] font-bold text-on-surface">9.1</span>

</div>
<h3 class="font-bold text-base leading-tight mb-1 text-on-surface group-hover:text-primary transition-colors px-1">The Last Canvas</h3>
<p class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold px-1">DRAMA • 2H 05M</p>

<!-- Movie Item 4 -->
<div class="flex flex-col group">

<img class="w-full h-full object-cover" data-alt="vintage movie projector" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKkznPgmD8DG4106YpkDhRxICikoro_rczKW7a9O6fZy2ziYpGEryFdHU-CtZbZ8TfXhMOcA7_-iLjnYfYPhQJGz-3WMdL9rPwulUqJB95QWK6GOFguOsQzERN2upXsgVQqCpTgxkqIcv0Oxrze2uoxpmrJQin3g61I_FizEHmFj7Y9SMZdqLJbbbYsVujvngIQJIxd3ESgfnVuQymqM5Y8u9B0J91KX5B9uu0d3-W846h-_C0suuMK2Mjvcm9EksjOyxuRPWqpA"/>
<div class="absolute top-4 left-4 bg-white/95 backdrop-blur-md px-2.5 py-1 rounded-full flex items-center gap-1 shadow-sm">
<span class="material-symbols-outlined text-amber-500 text-xs" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-[11px] font-bold text-on-surface">8.2</span>
</div>
</div>
<h3 class="font-bold text-base leading-tight mb-1 text-on-surface group-hover:text-primary transition-colors px-1">Frame by Frame</h3>
<p class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold px-1">DOCUMENTARY • 1H 38M</p>
</div>
</div>
</main>
<!-- Bottom Navigation: Matches SCREEN_31 destinations -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-10 pt-4 bg-white/90 backdrop-blur-2xl z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.06)]">
<!-- Movies (Active) -->
<a class="flex flex-col items-center justify-center text-primary group" href="#">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">movie</span>
<span class="text-[10px] font-bold uppercase tracking-wider mt-1.5 active-nav-indicator">Poster</span>
</a>
<!-- Series -->
<a class="flex flex-col items-center justify-center text-zinc-400 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[28px]">tv_gen</span>
<span class="text-[10px] font-bold uppercase tracking-wider mt-1.5">Series</span>
</a>
<!-- Tickets -->
<a class="flex flex-col items-center justify-center text-zinc-400 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[28px]">confirmation_number</span>
<span class="text-[10px] font-bold uppercase tracking-wider mt-1.5">Tickets</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-zinc-400 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[28px]">person</span>
<span class="text-[10px] font-bold uppercase tracking-wider mt-1.5">Profile</span>
</a>
</nav>
</body></html>

<a class="flex flex-col items-center justify-center bg-[#E50914] text-white rounded-full px-5 py-2 active:scale-90 transition-all duration-300 shadow-lg shadow-[#E50914]/30" href="#">

<a class="flex flex-col items-center justify-center text-zinc-500 px-5 py-2 hover:bg-zinc-100 rounded-full active:scale-90 transition-all duration-300" href="#">
